# ArgoCD Application with selfHeal enabled.
# Point repoURL to wherever you host the 01-app-manifests/ directory
# (a git repo, or use a local path if using argocd-server --repo-server).
#
# REPRODUCTION STEPS:
#   1. Do NOT create the "transient-ns" namespace
#   2. Apply this Application: kubectl apply -f 02-application.yaml
#   3. ArgoCD will attempt to sync and FAIL (namespace doesn't exist)
#   4. Now create the namespace: kubectl apply -f 03-create-namespace.yaml
#   5. BUG: ArgoCD never retries — stuck with SyncError "failed previous sync attempt"
#   6. FIX: With the fix, selfHeal retries after backoff and the sync succeeds
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: selfheal-bug-repro
  namespace: openshift-gitops
spec:
  project: default
  source:
    # CHANGE THIS to your git repo URL containing the 01-app-manifests/ directory
    repoURL: https://github.com/mbaldessari/argocd-tests
    targetRevision: HEAD
    path: repro-selfheal-bug/01-app-manifests
  destination:
    server: https://kubernetes.default.svc
    # Note: the actual namespace is set in the manifests themselves (transient-ns)
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 0  # no retry policy — we rely solely on selfHeal
